<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stretch">
<meta name="theme-color" content="#0c0c10">
<title>Stretch</title>
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAEACAYAAABccqhmAAAABmJLR0QA/wD/AP+gvaeTAAAFDklEQVR4nO3BMQEAAADCoPVP7WsIoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAABHgAAAABJRU5ErkJggg==">
<style>
  :root {
    --bg: #0c0c10;
    --surface: #16161d;
    --border: #2a2a38;
    --text: #e8e8f0;
    --muted: #7070a0;
    --accent: #7c6af7;
    --accent-dim: #3d3580;
    --accent-glow: rgba(124,106,247,0.18);
    --green: #3fcf8e;
    --amber: #f5a623;
    --red: #f05c5c;
    --font: -apple-system, 'SF Pro Display', system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  /* ── Layout ── */
  #app { display: flex; flex-direction: column; height: 100dvh; height: 100vh; }
  #topbar { padding: env(safe-area-inset-top) 20px 0; padding-top: calc(env(safe-area-inset-top) + 14px); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  #bottomnav { flex-shrink: 0; display: flex; border-top: 1px solid var(--border); padding-bottom: env(safe-area-inset-bottom); background: var(--surface); }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0; font-size: 11px; color: var(--muted); cursor: pointer; border: none; background: none; transition: color .15s; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }

  /* ── Top bar ── */
  #brand { font-size: 18px; font-weight: 700; letter-spacing: -.3px; }
  #streak-chip { display: flex; align-items: center; gap: 5px; background: var(--accent-glow); border: 1px solid var(--accent-dim); border-radius: 20px; padding: 5px 12px; font-size: 13px; font-weight: 600; color: var(--accent); }

  /* ── Stretch Tab ── */
  #stretch-tab { padding: 20px 16px 100px; }
  .section-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .stretch-list { display: flex; flex-direction: column; gap: 10px; }
  .stretch-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; cursor: pointer; transition: border-color .15s, transform .1s; -webkit-user-select: none; user-select: none; }
  .stretch-card:active { transform: scale(0.98); }
  .stretch-card.done { border-color: var(--green); opacity: .7; }
  .stretch-card.active-card { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .card-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent-glow); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .card-info { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 600; }
  .card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .2s; }
  .stretch-card.done .card-check { background: var(--green); border-color: var(--green); }

  /* ── Timer overlay ── */
  #timer-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom); padding-top: calc(env(safe-area-inset-top) + 24px); display: none; }
  #timer-overlay.visible { display: flex; }
  #timer-close { align-self: flex-start; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; color: var(--muted); font-size: 14px; padding: 8px 16px; cursor: pointer; }
  #timer-phase { margin-top: 32px; font-size: 12px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--accent); min-height: 18px; }
  #timer-name { margin-top: 10px; font-size: 26px; font-weight: 700; text-align: center; line-height: 1.2; }
  #timer-side { margin-top: 6px; font-size: 14px; color: var(--accent); font-weight: 600; min-height: 20px; }
  #timer-note { margin-top: 10px; font-size: 14px; color: var(--muted); text-align: center; line-height: 1.5; padding: 0 8px; }

  /* Ring */
  #ring-wrap { margin-top: 40px; position: relative; display: flex; align-items: center; justify-content: center; }
  #ring-svg { transform: rotate(-90deg); }
  #ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  #ring-prog { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .4s linear, stroke .3s; }
  #ring-center { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  #timer-digits { font-size: 54px; font-weight: 700; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
  #timer-unit { font-size: 13px; color: var(--muted); margin-top: -4px; }

  /* Controls */
  #timer-controls { margin-top: 40px; display: flex; gap: 12px; align-items: center; }
  .ctrl-btn { border: 1px solid var(--border); border-radius: 14px; background: var(--surface); color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer; transition: background .15s; }
  .ctrl-btn:active { background: var(--border); }
  #btn-pause { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); border-color: var(--accent); font-size: 22px; }
  #btn-pause:active { background: var(--accent-dim); }
  #btn-skip { padding: 14px 20px; }
  #btn-plus { padding: 14px 20px; }

  /* Progress dots */
  #set-dots { margin-top: 28px; display: flex; gap: 8px; }
  .set-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: background .2s; }
  .set-dot.done-dot { background: var(--green); }
  .set-dot.active-dot { background: var(--accent); }

  /* ── History tab ── */
  #history-tab { padding: 20px 16px 100px; display: none; }
  .stat-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .stat-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 16px; text-align: center; }
  .stat-num { font-size: 30px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
  .history-day { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .history-date { font-size: 13px; font-weight: 700; }
  .history-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); font-size: 15px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Complete banner ── */
  #complete-banner { display: none; position: fixed; bottom: calc(70px + env(safe-area-inset-bottom)); left: 16px; right: 16px; background: var(--green); color: #fff; border-radius: 16px; padding: 16px 20px; font-size: 15px; font-weight: 700; text-align: center; z-index: 50; animation: slideUp .3s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ── Canvas for confetti ── */
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; display: none; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="brand">Stretch</div>
    <div id="streak-chip">🔥 <span id="streak-count">0</span> day streak</div>
  </div>

  <div id="main">
    <!-- Stretch Tab -->
    <div id="stretch-tab">
      <p class="section-label" id="routine-label">Today's Routine · ~10 min</p>
      <div class="stretch-list" id="stretch-list"></div>
    </div>

    <!-- History Tab -->
    <div id="history-tab">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num" id="h-streak">0</div><div class="stat-lbl">Day Streak</div></div>
        <div class="stat-box"><div class="stat-num" id="h-total">0</div><div class="stat-lbl">Sessions</div></div>
        <div class="stat-box"><div class="stat-num" id="h-week">0</div><div class="stat-lbl">This Week</div></div>
      </div>
      <p class="section-label">History</p>
      <div id="history-list"></div>
    </div>
  </div>

  <nav id="bottomnav">
    <button class="nav-btn active" id="nav-stretch" onclick="switchTab('stretch')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2"/><path d="M12 8v4l3 3"/></svg>
      Stretch
    </button>
    <button class="nav-btn" id="nav-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      History
    </button>
  </nav>
</div>

<!-- Timer Overlay -->
<div id="timer-overlay">
  <button id="timer-close" onclick="closeTimer()">✕ Close</button>
  <div id="timer-phase"></div>
  <div id="timer-name"></div>
  <div id="timer-side"></div>
  <div id="timer-note"></div>

  <div id="ring-wrap">
    <svg id="ring-svg" width="200" height="200" viewBox="0 0 200 200">
      <circle id="ring-bg" cx="100" cy="100" r="88"/>
      <circle id="ring-prog" cx="100" cy="100" r="88"/>
    </svg>
    <div id="ring-center">
      <div id="timer-digits">0:00</div>
      <div id="timer-unit">seconds</div>
    </div>
  </div>

  <div id="set-dots"></div>

  <div id="timer-controls">
    <button class="ctrl-btn" id="btn-plus" onclick="addTime()">+15s</button>
    <button class="ctrl-btn" id="btn-pause" onclick="togglePause()">⏸</button>
    <button class="ctrl-btn" id="btn-skip" onclick="skipPhase()">Skip →</button>
  </div>
</div>

<div id="complete-banner">🌟 Session complete! Great work.</div>
<canvas id="confetti-canvas"></canvas>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const STRETCHES = [
  { id:0,  name: "Neck Side Stretch",      icon: "🧠", hold: 30, sets: 2, bilateral: true,  note: "Ear to shoulder, keep the opposite shoulder down. Breathe into the stretch." },
  { id:1,  name: "Chest Opener",           icon: "🫁", hold: 40, sets: 2, bilateral: false, note: "Clasp hands behind back, lift chest and squeeze shoulder blades together." },
  { id:2,  name: "Thoracic Rotation",      icon: "🔄", hold: 30, sets: 2, bilateral: true,  note: "Seated, cross arms on chest and rotate through the upper back — not the hips." },
  { id:3,  name: "Door Frame Shoulder",    icon: "🚪", hold: 40, sets: 1, bilateral: true,  note: "Elbow at 90°, lean through a doorway. Feel the front of the shoulder open." },
  { id:4,  name: "Hip Flexor Lunge",       icon: "🦵", hold: 45, sets: 2, bilateral: true,  note: "Back knee down, drive hips forward. Squeeze the glute of the back leg for a deeper stretch." },
  { id:5,  name: "Pigeon Pose (Glute)",    icon: "🍑", hold: 50, sets: 1, bilateral: true,  note: "Keep hips square to the ground. Fold forward for a deeper stretch." },
  { id:6,  name: "Hamstring Reach",        icon: "🦶", hold: 40, sets: 2, bilateral: true,  note: "Straight leg, hinge at the hip — don't round the lower back. Reach toward toes." },
  { id:7,  name: "Standing Quad Stretch",  icon: "🏃", hold: 35, sets: 1, bilateral: true,  note: "Heel to glute, knee pointing down. Use a wall for balance." },
  { id:8,  name: "Ankle CARs",             icon: "🦴", hold: 20, sets: 2, bilateral: true,  note: "Slow controlled circles — 5 rotations each direction. Full range of motion." },
  { id:9,  name: "Calf & Soleus Stretch",  icon: "🧦", hold: 35, sets: 1, bilateral: true,  note: "For soleus: slight knee bend in the back leg. Hold the wall, drive heel into ground." },
];

const STORAGE_KEY = 'stretching_progress_v1';

// ─── State ───────────────────────────────────────────────────────────────────
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { progress: {}, history: [], activeTab: 'stretch' };
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function isoWeek(date) {
  const d = new Date(date);
  d.setHours(12,0,0,0);
  d.setDate(d.getDate() + 4 - (d.getDay()||7));
  const year = d.getFullYear();
  const jan4 = new Date(year,0,4);
  const w = Math.ceil(((d - jan4) / 86400000 + (jan4.getDay()||7)) / 7);
  return `${year}-W${String(w).padStart(2,'0')}`;
}

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

function progressKey(stretchId, setIdx) {
  return `${todayKey()}|${stretchId}-${setIdx}`;
}

function isDone(stretchId, setIdx) {
  return !!state.progress[progressKey(stretchId, setIdx)];
}

function isStretchDone(stretchId) {
  const s = STRETCHES.find(x=>x.id===stretchId);
  for (let i=0; i<s.sets; i++) if (!isDone(stretchId, i)) return false;
  return true;
}

function isSessionDone() {
  return STRETCHES.every(s => isStretchDone(s.id));
}

function markSet(stretchId, setIdx) {
  state.progress[progressKey(stretchId, setIdx)] = true;
  saveState();
}

function calcStreak() {
  const days = [...new Set(state.history.map(h=>h.date))].sort().reverse();
  if (!days.length) return 0;
  let streak = 0;
  const today = todayKey();
  const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yd = yesterday.toISOString().slice(0,10);
  let expect = days[0] === today ? today : yd;
  for (const d of days) {
    if (d === expect) { streak++; const dt = new Date(d); dt.setDate(dt.getDate()-1); expect = dt.toISOString().slice(0,10); }
    else if (d < expect) break;
  }
  return streak;
}

// ─── Audio ───────────────────────────────────────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function resumeAudio() {
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

document.addEventListener('touchstart', resumeAudio, { passive: true });
document.addEventListener('click', resumeAudio);

function keepAudioAlive() {
  if (!audioCtx) return;
  try {
    const buf = audioCtx.createBuffer(1,1,22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
  } catch(e) {}
}

function playBeep(freq, dur, vol=0.25, type='sine', delay=0) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = type;
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + delay + 0.01);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + delay + dur);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + dur + 0.05);
  } catch(e) {}
}

function playTick(isLast) {
  if (isLast) playBeep(880, 0.08, 0.3, 'square');
  else playBeep(330, 0.06, 0.15, 'sine');
}

function playChime() {
  playBeep(523, 0.15, 0.3, 'sine', 0);
  playBeep(659, 0.15, 0.3, 'sine', 0.15);
  playBeep(784, 0.25, 0.3, 'sine', 0.30);
}

function playFanfare() {
  const notes = [523,659,784,1047];
  notes.forEach((f,i) => playBeep(f, 0.2, 0.4, 'triangle', i*0.12));
}

// ─── Timer ───────────────────────────────────────────────────────────────────
const CIRC = 2 * Math.PI * 88;
let timer = null; // { stretchIdx, setIdx, phase, side, remaining, total, paused, interval }

function openTimer(stretchIdx) {
  const s = STRETCHES[stretchIdx];
  // find first undone set
  let setIdx = 0;
  while (setIdx < s.sets && isDone(s.id, setIdx)) setIdx++;
  if (setIdx >= s.sets) { setIdx = 0; } // redo

  timer = { stretchIdx, setIdx, phase: 'ready', side: s.bilateral ? 1 : 0,
    remaining: 5, total: 5, paused: false, interval: null };

  document.getElementById('timer-overlay').classList.add('visible');
  renderTimer();
  startTick();
}

function closeTimer() {
  if (timer && timer.interval) clearInterval(timer.interval);
  timer = null;
  document.getElementById('timer-overlay').classList.remove('visible');
}

function startTick() {
  if (timer.interval) clearInterval(timer.interval);
  timer.interval = setInterval(tick, 1000);
}

function tick() {
  if (!timer || timer.paused) return;
  keepAudioAlive();

  if (timer.remaining > 1) {
    timer.remaining--;
    const isLast = timer.remaining <= 3;
    if (timer.phase === 'ready' || timer.phase === 'switch') playTick(isLast);
    renderTimer();
  } else {
    // phase end
    advancePhase();
  }
}

function advancePhase() {
  const s = STRETCHES[timer.stretchIdx];
  playChime();

  if (timer.phase === 'ready') {
    timer.phase = 'hold';
    timer.remaining = s.hold;
    timer.total = s.hold;
  } else if (timer.phase === 'hold') {
    if (s.bilateral && timer.side === 1) {
      // switch to side 2
      timer.phase = 'switch';
      timer.side = 2;
      timer.remaining = 5;
      timer.total = 5;
    } else {
      // set complete
      markSet(s.id, timer.setIdx);
      renderList();
      timer.setIdx++;
      if (timer.setIdx < s.sets) {
        // next set
        timer.phase = 'ready';
        timer.side = s.bilateral ? 1 : 0;
        timer.remaining = 5;
        timer.total = 5;
      } else {
        // stretch done
        if (timer.interval) clearInterval(timer.interval);
        renderTimer();
        setTimeout(() => {
          closeTimer();
          checkSessionComplete();
        }, 800);
        return;
      }
    }
  } else if (timer.phase === 'switch') {
    timer.phase = 'hold';
    timer.remaining = s.hold;
    timer.total = s.hold;
  }
  renderTimer();
}

function togglePause() {
  if (!timer) return;
  timer.paused = !timer.paused;
  document.getElementById('btn-pause').textContent = timer.paused ? '▶' : '⏸';
}

function addTime() {
  if (!timer) return;
  timer.remaining += 15;
  timer.total += 15;
  renderTimer();
}

function skipPhase() {
  if (!timer) return;
  timer.remaining = 1;
  tick();
}

function renderTimer() {
  if (!timer) return;
  const s = STRETCHES[timer.stretchIdx];
  const el = id => document.getElementById(id);

  // Phase label
  const phaseMap = { ready: 'GET READY', hold: 'HOLD', switch: 'SWITCH SIDES' };
  el('timer-phase').textContent = phaseMap[timer.phase] || '';

  // Color
  const colorMap = { ready: 'var(--amber)', hold: 'var(--accent)', switch: 'var(--green)' };
  el('timer-phase').style.color = colorMap[timer.phase];
  el('ring-prog').style.stroke = colorMap[timer.phase];

  el('timer-name').textContent = s.name;
  el('timer-note').textContent = s.note;

  // Side
  if (s.bilateral && timer.phase === 'hold') {
    el('timer-side').textContent = timer.side === 1 ? '← Left Side' : 'Right Side →';
  } else { el('timer-side').textContent = ''; }

  // Digits
  const secs = timer.remaining;
  el('timer-digits').textContent = secs >= 60 ? `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}` : `${secs}`;
  el('timer-unit').textContent = secs >= 60 ? '' : 'seconds';

  // Ring
  const pct = timer.remaining / timer.total;
  const dash = CIRC * pct;
  el('ring-prog').style.strokeDasharray = CIRC;
  el('ring-prog').style.strokeDashoffset = CIRC - dash;

  // Dots
  const dots = document.getElementById('set-dots');
  dots.innerHTML = '';
  for (let i=0; i<s.sets; i++) {
    const d = document.createElement('div');
    d.className = 'set-dot' + (isDone(s.id,i) ? ' done-dot' : (i === timer.setIdx ? ' active-dot' : ''));
    dots.appendChild(d);
  }
}

// ─── Session complete ─────────────────────────────────────────────────────────
let sessionLogged = false;

function checkSessionComplete() {
  if (!isSessionDone()) return;

  const today = todayKey();
  const alreadyLogged = state.history.some(h => h.date === today);
  if (alreadyLogged) return;

  state.history.unshift({ date: today, count: STRETCHES.length, mins: 10 });
  saveState();
  renderStreak();
  renderHistory();

  playFanfare();
  launchConfetti();

  const banner = document.getElementById('complete-banner');
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display = 'none'; }, 4000);
}

// ─── Confetti ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#7c6af7','#3fcf8e','#f5a623','#f05c5c','#60c0f0','#e8e8f0'];
  const pieces = Array.from({length:100}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    r: 3 + Math.random() * 5,
    d: Math.random() * 3 + 1,
    vx: (Math.random()-0.5)*2,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*360, rotd: (Math.random()-0.5)*4
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, 1 - frame/140);
      ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      ctx.restore();
      p.y += p.d; p.x += p.vx; p.rot += p.rotd;
    });
    frame++;
    if (frame < 160) requestAnimationFrame(draw);
    else { canvas.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  requestAnimationFrame(draw);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('stretch-list');
  list.innerHTML = '';
  STRETCHES.forEach((s, idx) => {
    const done = isStretchDone(s.id);
    const div = document.createElement('div');
    div.className = 'stretch-card' + (done ? ' done' : '');
    div.onclick = () => { if (!timer) openTimer(idx); };

    const setsLabel = s.bilateral
      ? `${s.sets} set${s.sets>1?'s':''} each side · ${s.hold}s`
      : `${s.sets} set${s.sets>1?'s':''} · ${s.hold}s`;

    div.innerHTML = `
      <div class="card-icon">${s.icon}</div>
      <div class="card-info">
        <div class="card-name">${s.name}</div>
        <div class="card-meta">${setsLabel}</div>
      </div>
      <div class="card-check">${done ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,7 5.5,10.5 12,3"/></svg>' : ''}</div>
    `;
    list.appendChild(div);
  });
}

function renderStreak() {
  const s = calcStreak();
  document.getElementById('streak-count').textContent = s;
  document.getElementById('h-streak').textContent = s;
}

function renderHistory() {
  document.getElementById('h-total').textContent = state.history.length;
  const week = isoWeek(new Date());
  document.getElementById('h-week').textContent = state.history.filter(h => isoWeek(new Date(h.date)) === week).length;

  const list = document.getElementById('history-list');
  if (!state.history.length) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">🌱</div>Complete your first session to see history.</div>';
    return;
  }
  list.innerHTML = state.history.map(h => {
    const d = new Date(h.date + 'T12:00:00');
    const label = d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
    return `<div class="history-day"><div class="history-date">${label}</div><div class="history-meta">Full body · ${h.count} stretches · ~${h.mins} min</div></div>`;
  }).join('');
}

function renderAll() {
  renderList();
  renderStreak();
  renderHistory();
}

// ─── Navigation ──────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('stretch-tab').style.display = tab==='stretch' ? '' : 'none';
  document.getElementById('history-tab').style.display = tab==='history' ? '' : 'none';
  document.getElementById('nav-stretch').className = 'nav-btn' + (tab==='stretch'?' active':'');
  document.getElementById('nav-history').className = 'nav-btn' + (tab==='history'?' active':'');
  state.activeTab = tab;
  saveState();
}

// ─── Calories ─────────────────────────────────────────────────────────────────
// Stretching MET ≈ 2.3. Total hold time across all stretches + transitions.
function calcKcal() {
  // Try to read weight from calisthenics app profile first, then our own state
  let weightKg = 75;
  try {
    const cal = JSON.parse(localStorage.getItem('calisthenics_progress_v2') || '{}');
    if (cal.profile) {
      const w = parseFloat(cal.profile.weight);
      if (!isNaN(w)) weightKg = cal.profile.unit === 'lbs' ? w * 0.453592 : w;
    }
  } catch(e) {}
  // fallback: our own state
  if (state.profile) {
    const w = parseFloat(state.profile.weight);
    if (!isNaN(w)) weightKg = state.profile.unit === 'lbs' ? w * 0.453592 : w;
  }

  // Total active seconds: sum of all hold times (both sides if bilateral) + get-ready phases
  let totalSecs = 0;
  STRETCHES.forEach(s => {
    const sides = s.bilateral ? 2 : 1;
    totalSecs += s.sets * sides * s.hold; // hold time
    totalSecs += s.sets * 5;              // get-ready per set
  });
  const hours = totalSecs / 3600;
  const MET = 2.3;
  return Math.round(MET * weightKg * hours * 1.1);
}

function renderRoutineLabel() {
  const kcal = calcKcal();
  document.getElementById('routine-label').textContent = `Today's Routine · ~10 min · 🔥 ${kcal} kcal`;
}

// ─── Init ─────────────────────────────────────────────────────────────────────
switchTab(state.activeTab || 'stretch');
renderAll();
renderRoutineLabel();
</script>
