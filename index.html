<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stretch">
<link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAQAAAAEACAYAAABccqhmAAAABmJLR0QA/wD/AP+gvaeTAAAFDklEQVR4nO3BMQEAAADCoPVP7WsIoAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAeAMBuAABHgAAAABJRU5ErkJggg==">
<title>Stretch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;500;600;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: #0a0a0a;
    color: #f0ede8;
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100%;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }

  #app {
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
  }

  button { font-family: inherit; border: none; background: none; color: inherit; cursor: pointer; }

  /* ── Topbar ── */
  .topbar {
    padding: 18px 20px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #1c1c1c;
  }
  .brand { font-family: 'Archivo Black', sans-serif; font-size: 17px; letter-spacing: 0.5px; }
  .brand span { color: #7c6af7; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .streak-chip {
    font-size: 12px; font-weight: 600; color: #7c6af7;
    background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.3);
    padding: 5px 12px; border-radius: 20px;
  }

  /* ── Main scroll area ── */
  .main { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }

  /* ── Section label ── */
  .section-label {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #555; margin-bottom: 14px; font-weight: 700;
  }

  /* ── Stretch cards ── */
  .ex-card {
    border: 1px solid #1c1c1c; border-radius: 14px;
    margin-bottom: 12px; overflow: hidden; transition: border-color 0.2s;
  }
  .ex-card.complete { border-color: #2a3a2a; background: rgba(80,200,120,0.04); }

  .ex-main {
    padding: 16px 16px 14px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
  }
  .ex-info { flex: 1; }
  .ex-name-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .ex-name { font-size: 15.5px; font-weight: 600; }
  .ex-note { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.5; }
  .ex-sets-label { font-size: 12px; color: #888; white-space: nowrap; padding-top: 2px; font-weight: 500; }

  .set-row { display: flex; gap: 6px; padding: 0 16px 16px; flex-wrap: wrap; }
  .set-chip {
    flex: 1; min-width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid #2a2a2a; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 600; color: #555;
    transition: all 0.15s;
  }
  .set-chip.done { background: #3fcf8e; border-color: #3fcf8e; color: #0a0a0a; }
  .set-chip.timed { flex-direction: column; gap: 1px; font-size: 10px; }
  .set-chip.timed .t { font-size: 13px; font-weight: 700; }

  /* ── Timer overlay ── */
  .timer-overlay {
    position: fixed; inset: 0; background: #0a0a0a; z-index: 100;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
  }
  .timer-close {
    position: absolute; top: calc(env(safe-area-inset-top) + 20px); right: 20px;
    font-size: 13px; color: #555; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px;
  }
  .timer-kind { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; margin-bottom: 6px; }
  .timer-exname { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 40px; color: #999; }
  .timer-ring-wrap { position: relative; width: 260px; height: 260px; }
  .timer-ring-wrap svg { transform: rotate(-90deg); }
  .timer-num {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Archivo Black', sans-serif; font-size: 64px;
  }
  .timer-controls { display: flex; gap: 16px; margin-top: 48px; }
  .timer-btn {
    width: 64px; height: 64px; border-radius: 50%; border: 1px solid #2a2a2a;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .timer-btn.primary {
    background: #7c6af7; border-color: #7c6af7; color: #fff;
    width: 80px; height: 80px; font-size: 24px;
  }
  .timer-skip {
    margin-top: 28px; font-size: 12px; color: #555;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 20px;
  }

  /* ── History tab ── */
  .habit-stats {
    display: flex; border: 1px solid #1c1c1c; border-radius: 14px;
    overflow: hidden; margin-bottom: 24px;
  }
  .habit-stat { flex: 1; padding: 18px 12px; text-align: center; border-right: 1px solid #1c1c1c; }
  .habit-stat:last-child { border-right: none; }
  .habit-stat-num { font-family: 'Archivo Black', sans-serif; font-size: 32px; line-height: 1; color: #7c6af7; }
  .habit-stat-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
  .habit-week-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #555; margin: 20px 0 8px; }
  .habit-session-card {
    border: 1px solid #1c1c1c; border-radius: 12px; padding: 14px 16px;
    margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
  }
  .habit-session-day { font-size: 14px; font-weight: 600; }
  .habit-session-note { font-size: 11px; color: #666; margin-top: 3px; }
  .habit-session-count { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; color: #7c6af7; }
  .habit-empty { text-align: center; padding: 60px 20px; font-size: 14px; color: #555; line-height: 1.7; }

  /* ── Bottom nav ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; border-top: 1px solid #1c1c1c; background: #0a0a0a;
    padding-bottom: env(safe-area-inset-bottom); z-index: 50;
  }
  .bottom-nav button {
    flex: 1; padding: 12px 0; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #555;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .bottom-nav button.active { color: #7c6af7; }
  .bottom-nav button .nav-icon { font-size: 18px; }

  /* ── Install banner ── */
  .install-banner {
    margin: 0 20px 16px; padding: 12px 14px;
    border: 1px solid #7c6af7; border-radius: 10px;
    font-size: 12px; color: #ccc;
    display: flex; justify-content: space-between; align-items: center; gap: 10px;
  }
  .install-banner b { color: #7c6af7; }
  .install-x { color: #555; font-size: 16px; padding: 4px; }

  /* ── Confetti canvas ── */
  #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 200; display: none; }
</style>
</head>
<body>
<div id="app"></div>
<canvas id="confetti-canvas"></canvas>

<script>
// ─── Stretches ───────────────────────────────────────────────────────────────
const STRETCHES = [
  { id:0, name:"Neck Side Stretch",     icon:"🧠", hold:30, sets:2, bilateral:true,  note:"Ear to shoulder, keep the opposite shoulder down. Breathe into the stretch." },
  { id:1, name:"Chest Opener",          icon:"🫁", hold:40, sets:2, bilateral:false, note:"Clasp hands behind back, lift chest and squeeze shoulder blades together." },
  { id:2, name:"Thoracic Rotation",     icon:"🔄", hold:30, sets:2, bilateral:true,  note:"Seated, cross arms on chest and rotate through the upper back — not the hips." },
  { id:3, name:"Door Frame Shoulder",   icon:"🚪", hold:40, sets:1, bilateral:true,  note:"Elbow at 90°, lean through a doorway. Feel the front of the shoulder open." },
  { id:4, name:"Hip Flexor Lunge",      icon:"🦵", hold:45, sets:2, bilateral:true,  note:"Back knee down, drive hips forward. Squeeze the glute of the back leg." },
  { id:5, name:"Pigeon Pose (Glute)",   icon:"🍑", hold:50, sets:1, bilateral:true,  note:"Keep hips square to the ground. Fold forward for a deeper stretch." },
  { id:6, name:"Hamstring Reach",       icon:"🦶", hold:40, sets:2, bilateral:true,  note:"Straight leg, hinge at the hip — don't round the lower back. Reach toward toes." },
  { id:7, name:"Standing Quad Stretch", icon:"🏃", hold:35, sets:1, bilateral:true,  note:"Heel to glute, knee pointing down. Use a wall for balance." },
  { id:8, name:"Ankle CARs",            icon:"🦴", hold:20, sets:2, bilateral:true,  note:"Slow controlled circles — 5 each direction. Full range of motion." },
  { id:9, name:"Calf & Soleus Stretch", icon:"🧦", hold:35, sets:1, bilateral:true,  note:"Slight knee bend for soleus. Drive heel into ground, hold the wall." },
];

const STORAGE_KEY = 'stretching_progress_v1';
const GETREADY_DUR = 5;
const SWITCH_DUR = 5;

// ─── State ───────────────────────────────────────────────────────────────────
let state = { progress: {}, history: [], showInstall: true, activeTab: 'stretch', profile: {} };

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state.progress   = p.progress   || {};
      state.history    = p.history    || [];
      state.showInstall= p.showInstall !== false;
      state.activeTab  = p.activeTab  || 'stretch';
      state.profile    = p.profile    || {};
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

loadState();

// ─── Keys ────────────────────────────────────────────────────────────────────
function todayKey() { return new Date().toISOString().slice(0,10); }

function progKey(stretchId, setIdx) {
  return `${todayKey()}|${stretchId}-${setIdx}`;
}

function isDone(stretchId, setIdx) { return !!state.progress[progKey(stretchId, setIdx)]; }

function isStretchDone(stretchId) {
  const s = STRETCHES.find(x => x.id === stretchId);
  for (let i = 0; i < s.sets; i++) if (!isDone(stretchId, i)) return false;
  return true;
}

function isSessionDone() { return STRETCHES.every(s => isStretchDone(s.id)); }

function markSet(stretchId, setIdx) {
  state.progress[progKey(stretchId, setIdx)] = true;
  saveState();
}

// ─── Streak ──────────────────────────────────────────────────────────────────
function calcStreak() {
  const days = [...new Set(state.history.map(h => h.date))].sort().reverse();
  if (!days.length) return 0;
  let streak = 0;
  const today = todayKey();
  const yd = new Date(); yd.setDate(yd.getDate()-1);
  let expect = days[0] === today ? today : yd.toISOString().slice(0,10);
  for (const d of days) {
    if (d === expect) {
      streak++;
      const dt = new Date(d); dt.setDate(dt.getDate()-1);
      expect = dt.toISOString().slice(0,10);
    } else if (d < expect) break;
  }
  return streak;
}

// ─── Calories ────────────────────────────────────────────────────────────────
function getWeightKg() {
  // try calisthenics app profile first
  try {
    const cal = JSON.parse(localStorage.getItem('calisthenics_progress_v2') || '{}');
    if (cal.profile && cal.profile.weight) {
      const w = parseFloat(cal.profile.weight);
      if (!isNaN(w)) return cal.profile.unit === 'lbs' ? w * 0.453592 : w;
    }
  } catch(e) {}
  if (state.profile && state.profile.weight) {
    const w = parseFloat(state.profile.weight);
    if (!isNaN(w)) return state.profile.unit === 'lbs' ? w * 0.453592 : w;
  }
  return 75;
}

function calcKcal() {
  const weightKg = getWeightKg();
  let totalSecs = 0;
  STRETCHES.forEach(s => {
    const sides = s.bilateral ? 2 : 1;
    totalSecs += s.sets * sides * s.hold + s.sets * GETREADY_DUR;
  });
  return Math.round(2.3 * weightKg * (totalSecs / 3600) * 1.1);
}

// ─── Audio ───────────────────────────────────────────────────────────────────
let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_audioCtx.state === 'suspended') _audioCtx.resume();
  return _audioCtx;
}
document.addEventListener('touchstart', () => { if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume(); }, { passive: true });
document.addEventListener('click',      () => { if (_audioCtx && _audioCtx.state === 'suspended') _audioCtx.resume(); }, { passive: true });

function keepAudioAlive() {
  try {
    const ctx = getAudioCtx();
    const buf = ctx.createBuffer(1,1,22050);
    const src = ctx.createBufferSource();
    src.buffer = buf; src.connect(ctx.destination); src.start();
  } catch(e) {}
}

function playChime() {
  try {
    const ctx = getAudioCtx(); const now = ctx.currentTime;
    [[0,660,0.25],[0.18,880,0.2],[0.36,1100,0.15]].forEach(([t,freq,vol]) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, now+t);
      g.gain.exponentialRampToValueAtTime(0.001, now+t+0.6);
      o.start(now+t); o.stop(now+t+0.7);
    });
    if (navigator.vibrate) navigator.vibrate([150,80,150]);
  } catch(e) {}
}

function playCountdownBeep(secondsLeft) {
  try {
    const ctx = getAudioCtx(); const now = ctx.currentTime;
    const isLast = secondsLeft === 1;
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine'; o.frequency.value = isLast ? 1200 : 400;
    g.gain.setValueAtTime(0.3, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.15);
    o.start(now); o.stop(now+0.18);
    if (isLast && navigator.vibrate) navigator.vibrate(80);
  } catch(e) {}
}

function playFanfare() {
  try {
    const ctx = getAudioCtx(); const now = ctx.currentTime;
    [[0,523,0.3,'square'],[0.12,659,0.3,'square'],[0.24,784,0.3,'square'],
     [0.38,1047,0.4,'square'],[0.38,784,0.3,'square'],[0.6,1047,0.5,'square']].forEach(([t,freq,vol,type]) => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol*0.3, now+t);
      g.gain.exponentialRampToValueAtTime(0.001, now+t+0.25);
      o.start(now+t); o.stop(now+t+0.3);
    });
    if (navigator.vibrate) navigator.vibrate([100,50,100,50,200]);
  } catch(e) {}
}

// ─── Confetti ────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.style.display = 'block';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#7c6af7','#3fcf8e','#f5a623','#f05c5c','#60c0f0','#f0ede8'];
  const pieces = Array.from({length:120}, () => ({
    x: Math.random()*canvas.width, y: -10-Math.random()*200,
    w: 6+Math.random()*8, h: 10+Math.random()*8,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*Math.PI*2, rotSpeed: (Math.random()-0.5)*0.2,
    vy: 3+Math.random()*5, vx: (Math.random()-0.5)*4, opacity: 1,
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotSpeed; p.vy+=0.15;
      if (frame>80) p.opacity-=0.015;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.opacity);
      ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    frame++;
    if (frame<140) requestAnimationFrame(draw);
    else { canvas.style.display='none'; ctx.clearRect(0,0,canvas.width,canvas.height); }
  }
  requestAnimationFrame(draw);
}

// ─── Timer ───────────────────────────────────────────────────────────────────
let timerState = null;
let _pendingKey = null;

function startTimer(stretchId, setIdx) {
  stopTimerInterval();
  const s = STRETCHES.find(x => x.id === stretchId);
  _pendingKey = progKey(stretchId, setIdx);
  timerState = {
    stretchId, setIdx, phase: 'getready',
    seconds: GETREADY_DUR, total: GETREADY_DUR,
    holdDuration: s.hold, bilateral: s.bilateral,
    exName: s.name, running: true, interval: null
  };
  render();
  timerState.interval = setInterval(tick, 1000);
}

function tick() {
  if (!timerState || !timerState.running) return;
  keepAudioAlive();
  timerState.seconds--;
  const s = timerState.seconds;
  const phase = timerState.phase;

  if (phase === 'getready' || phase === 'switch') {
    if (s > 0) { playCountdownBeep(s); renderTimerOnly(); return; }
    // transition into hold
    if (phase === 'getready') {
      timerState.phase = timerState.bilateral ? 'side1' : 'hold';
    } else {
      timerState.phase = 'side2';
    }
    timerState.seconds = timerState.holdDuration;
    timerState.total   = timerState.holdDuration;
    renderTimerOnly(); return;
  }

  if (s > 0) { renderTimerOnly(); return; }

  // end of hold phase
  if (phase === 'side1') {
    playChime();
    timerState.phase   = 'switch';
    timerState.seconds = SWITCH_DUR;
    timerState.total   = SWITCH_DUR;
    renderTimerOnly(); return;
  }

  // hold, side2 — set complete
  playChime();
  if (_pendingKey) {
    state.progress[_pendingKey] = true;
    _pendingKey = null;
    saveState();
  }
  stopTimerInterval();
  timerState = null;
  checkSessionComplete();
  render();
}

function stopTimerInterval() {
  if (timerState && timerState.interval) clearInterval(timerState.interval);
}
function closeTimer() { stopTimerInterval(); timerState = null; render(); }
function toggleTimerPause() {
  if (timerState) { timerState.running = !timerState.running; renderTimerOnly(); }
}

function getPhaseLabel() {
  if (!timerState) return '';
  const map = { getready:'GET READY', side1:'SIDE 1', switch:'SWITCH SIDES', side2:'SIDE 2', hold:'HOLD' };
  return map[timerState.phase] || 'HOLD';
}
function getPhaseColor() {
  if (!timerState) return '#7c6af7';
  if (timerState.phase === 'getready') return '#888';
  if (timerState.phase === 'switch')   return '#f5a623';
  return '#7c6af7';
}
function formatTime(s) {
  const m = Math.floor(s/60); return `${m}:${String(s%60).padStart(2,'0')}`;
}

// ─── Session complete ─────────────────────────────────────────────────────────
let _sessionLoggedToday = false;

function checkSessionComplete() {
  if (!isSessionDone()) return;
  const today = todayKey();
  if (state.history.some(h => h.date === today)) return;
  state.history.unshift({ date: today, count: STRETCHES.length });
  saveState();
  setTimeout(() => { playFanfare(); launchConfetti(); }, 100);
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');

  if (timerState) {
    app.innerHTML = renderTimerOverlay();
    attachTimerHandlers();
    return;
  }

  const tab = state.activeTab || 'stretch';
  const streak = calcStreak();
  const kcal = calcKcal();

  let html = `
    <div class="topbar">
      <div class="brand">STRETCH</div>
      <div class="topbar-right">
        <div class="streak-chip">🔥 ${streak} day streak</div>
      </div>
    </div>
  `;

  if (tab === 'stretch') {
    html += `
      ${state.showInstall ? `
      <div class="install-banner">
        <span><b>Add to Home Screen:</b> tap Share → "Add to Home Screen" in Safari.</span>
        <button class="install-x" id="dismissInstall">×</button>
      </div>` : ''}
      <div class="main">
        <div class="section-label">Today's Routine · ~10 min · 🔥 ${kcal} kcal</div>
        ${renderStretchList()}
      </div>
    `;
  } else {
    html += `<div class="main">${renderHistory(streak)}</div>`;
  }

  html += `
    <div class="bottom-nav">
      <button id="tabStretch" class="${tab==='stretch'?'active':''}">
        <span class="nav-icon">🧘</span>Stretch
      </button>
      <button id="tabHistory" class="${tab==='history'?'active':''}">
        <span class="nav-icon">📅</span>History
      </button>
    </div>
  `;

  app.innerHTML = html;
  attachHandlers();
}

function renderStretchList() {
  return STRETCHES.map(s => {
    const allDone = isStretchDone(s.id);
    const setsArr = Array.from({length: s.sets});
    const setsLabel = s.bilateral
      ? `${s.sets} set${s.sets>1?'s':''} · ${s.hold}s ea side`
      : `${s.sets} set${s.sets>1?'s':''} · ${s.hold}s`;

    return `
      <div class="ex-card ${allDone?'complete':''}">
        <div class="ex-main">
          <div class="ex-info">
            <div class="ex-name-row">
              <span class="ex-name">${s.icon} ${s.name}</span>
            </div>
            <div class="ex-note">${s.note}</div>
          </div>
          <div class="ex-sets-label">${setsLabel}</div>
        </div>
        <div class="set-row">
          ${setsArr.map((_,si) => {
            const done = isDone(s.id, si);
            const label = s.bilateral ? `${si+1}<br><span style="font-size:9px">ea side</span>` : `${si+1}`;
            return `<button class="set-chip timed ${done?'done':''}" data-action="timer" data-id="${s.id}" data-si="${si}">
              <span class="t">${si+1}</span>
              <span>${s.bilateral ? s.hold+'s ea' : s.hold+'s'}</span>
            </button>`;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function renderHistory(streak) {
  const today = todayKey();
  const thisWeekDates = Array.from({length:7}, (_,i) => {
    const d = new Date(); d.setDate(d.getDate()-i); return d.toISOString().slice(0,10);
  });
  const thisWeekCount = state.history.filter(h => thisWeekDates.includes(h.date)).length;
  const total = state.history.length;

  let html = `
    <div class="habit-stats">
      <div class="habit-stat">
        <div class="habit-stat-num">${streak}</div>
        <div class="habit-stat-label">Day Streak</div>
      </div>
      <div class="habit-stat">
        <div class="habit-stat-num">${total}</div>
        <div class="habit-stat-label">Sessions</div>
      </div>
      <div class="habit-stat">
        <div class="habit-stat-num">${thisWeekCount}</div>
        <div class="habit-stat-label">This Week</div>
      </div>
    </div>
    <div class="section-label">History</div>
  `;

  if (!state.history.length) {
    html += `<div class="habit-empty">Complete your first session to start tracking history.</div>`;
  } else {
    state.history.forEach(h => {
      const d = new Date(h.date + 'T12:00:00');
      const label = d.toLocaleDateString('en-US', { weekday:'long', month:'short', day:'numeric' });
      html += `
        <div class="habit-session-card">
          <div>
            <div class="habit-session-day">${label}</div>
            <div class="habit-session-note">Full body · ${h.count} stretches · ~10 min</div>
          </div>
          <div class="habit-session-count">✓ Done</div>
        </div>
      `;
    });
  }
  return html;
}

// ─── Timer overlay render ─────────────────────────────────────────────────────
function renderTimerOverlay() {
  const circ = 2 * Math.PI * 110;
  const pct  = timerState.seconds / timerState.total;
  const color = getPhaseColor();
  return `
    <div class="timer-overlay">
      <button class="timer-close" id="timerClose">Close</button>
      <div class="timer-kind" style="color:${color}">${getPhaseLabel()}</div>
      <div class="timer-exname">${timerState.exName}</div>
      <div class="timer-ring-wrap">
        <svg width="260" height="260">
          <circle cx="130" cy="130" r="110" fill="none" stroke="#1c1c1c" stroke-width="10"/>
          <circle class="ring-progress" cx="130" cy="130" r="110" fill="none"
            stroke="${color}" stroke-width="10"
            stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-pct)}"
            stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div class="timer-num">${formatTime(timerState.seconds)}</div>
      </div>
      <div class="timer-controls">
        <button class="timer-btn" id="timerReset">↺</button>
        <button class="timer-btn primary" id="timerPause">${timerState.running ? '❙❙' : '▶'}</button>
        <button class="timer-btn" id="timerAdd">+15</button>
      </div>
      <button class="timer-skip" id="timerSkip">Skip →</button>
    </div>
  `;
}

function renderTimerOnly() {
  const app = document.getElementById('app');
  const numEl  = app.querySelector('.timer-num');
  const ring   = app.querySelector('.ring-progress');
  const kindEl = app.querySelector('.timer-kind');
  const pauseBtn = app.querySelector('#timerPause');
  if (!numEl) return;
  numEl.textContent = formatTime(timerState.seconds);
  if (ring) {
    const circ = 2*Math.PI*110;
    const pct  = timerState.seconds / timerState.total;
    ring.style.strokeDashoffset = circ*(1-pct);
    ring.style.stroke = getPhaseColor();
  }
  if (kindEl) { kindEl.textContent = getPhaseLabel(); kindEl.style.color = getPhaseColor(); }
  if (pauseBtn) pauseBtn.textContent = timerState.running ? '❙❙' : '▶';
}

// ─── Event handlers ───────────────────────────────────────────────────────────
function attachHandlers() {
  document.getElementById('tabStretch')?.addEventListener('click', () => { state.activeTab='stretch'; saveState(); render(); });
  document.getElementById('tabHistory')?.addEventListener('click', () => { state.activeTab='history'; saveState(); render(); });
  document.getElementById('dismissInstall')?.addEventListener('click', () => { state.showInstall=false; saveState(); render(); });
  document.querySelectorAll('[data-action="timer"]').forEach(el => {
    el.addEventListener('click', () => startTimer(parseInt(el.dataset.id), parseInt(el.dataset.si)));
  });
}

function attachTimerHandlers() {
  document.getElementById('timerClose').onclick  = closeTimer;
  document.getElementById('timerPause').onclick  = toggleTimerPause;
  document.getElementById('timerReset').onclick  = () => {
    const phase = timerState.phase;
    if (phase === 'getready') { timerState.seconds = GETREADY_DUR; timerState.total = GETREADY_DUR; }
    else if (phase === 'switch') { timerState.seconds = SWITCH_DUR; timerState.total = SWITCH_DUR; }
    else { timerState.seconds = timerState.holdDuration; timerState.total = timerState.holdDuration; }
    renderTimerOnly();
  };
  document.getElementById('timerAdd').onclick    = () => { timerState.seconds+=15; timerState.total+=15; renderTimerOnly(); };
  document.getElementById('timerSkip').onclick   = () => {
    if (_pendingKey) { state.progress[_pendingKey]=true; _pendingKey=null; saveState(); }
    playChime();
    stopTimerInterval(); timerState=null;
    checkSessionComplete(); render();
  };
}

// ─── Boot ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
